name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
      - uses: actions/checkout@v4
      - name: Install Protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --no-fail-fast

  schema-integration:
    name: Schema E2E Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Python dependencies
        run: pip install httpx
      - name: Build PrkDB CLI
        run: cargo build -p prkdb-cli --bin prkdb-cli
      - name: Run Schema E2E Test
        run: ./scripts/test_schema_app_e2e.sh
        env:
          PRKDB_BIN: ./target/debug/prkdb-cli
          SKIP_BUILD: "1"

  client-features-integration:
    name: Client Features Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Python dependencies
        run: pip install httpx
      - name: Build PrkDB CLI
        run: cargo build -p prkdb-cli --bin prkdb-cli
      - name: Run Client Features Test
        run: ./scripts/test_client_features.sh
        env:
          PRKDB_BIN: ./target/debug/prkdb-cli
          SKIP_BUILD: "1"

  client-features-integration-ts:
    name: Client Features Integration (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build PrkDB CLI
        run: cargo build -p prkdb-cli --bin prkdb-cli
      - name: Run Client Features Test (TS)
        run: ./scripts/test_client_features_ts.sh
        env:
          PRKDB_BIN: ./target/debug/prkdb-cli
          SKIP_BUILD: "1"

  client-features-integration-go:
    name: Client Features Integration (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Build PrkDB CLI
        run: cargo build -p prkdb-cli --bin prkdb-cli
      - name: Run Client Features Test (Go)
        run: ./scripts/test_client_features_go.sh
        env:
          PRKDB_BIN: ./target/debug/prkdb-cli
          SKIP_BUILD: "1"

  # ═══════════════════════════════════════════════════════════════════════════
  # CHAOS ENGINEERING TESTS (reusable workflow)
  # ═══════════════════════════════════════════════════════════════════════════
  chaos-tests:
    name: "🐵 Chaos Tests"
    if: github.event_name == 'pull_request'
    needs: [check, test]
    uses: ./.github/workflows/chaos-tests.yml

  # ═══════════════════════════════════════════════════════════════════════════
  # LOCAL PRKDB BENCHMARKS + KAFKA REFERENCE RUNS
  # Features:
  #   - Local PrkDB producer/consumer/latency measurements
  #   - Kafka perf-tool reference runs on a single broker
  #   - Multiple runs (3x) for trend tracking
  #   - Explicit caveat: not an apples-to-apples system comparison
  # ═══════════════════════════════════════════════════════════════════════════
  benchmark:
    name: "📊 Benchmarks: Local PrkDB + Kafka Reference"
    runs-on: ubuntu-latest
    
    services:
      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        ports:
          - 2181:2181
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
          
      kafka:
        image: confluentinc/cp-kafka:7.5.0
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get install -y protobuf-compiler bc jq
        
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Build benchmarks
        run: cargo build --release --example comprehensive_bench --example partitioned_bench
          
      - name: Wait for Kafka
        run: |
          echo "Waiting for Kafka to be ready..."
          for i in {1..30}; do
            if docker exec $(docker ps -q -f ancestor=confluentinc/cp-kafka:7.5.0) \
               kafka-broker-api-versions --bootstrap-server localhost:9092 2>/dev/null; then
              echo "Kafka is ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done
          
      - name: Create Kafka topic
        run: |
          docker exec $(docker ps -q -f ancestor=confluentinc/cp-kafka:7.5.0) \
            kafka-topics --create \
            --topic benchmark-test \
            --bootstrap-server localhost:9092 \
            --partitions 4 \
            --replication-factor 1 || true
          sleep 2

      # ═══════════════════════════════════════════════════════════════════════
      # KAFKA BENCHMARKS (3 RUNS)
      # ═══════════════════════════════════════════════════════════════════════
      - name: "🔵 Kafka Producer Benchmark (3 runs)"
        id: kafka_producer
        run: |
          echo "Running Kafka producer benchmark (3 runs)..."
          KAFKA_CONTAINER=$(docker ps -q -f ancestor=confluentinc/cp-kafka:7.5.0)
          
          TOTAL_MBPS=0
          TOTAL_RPS=0
          declare -a LATENCIES_AVG
          declare -a LATENCIES_P99
          
          for run in 1 2 3; do
            echo "--- Run $run/3 ---"
            
            RESULT=$(docker exec $KAFKA_CONTAINER \
              kafka-producer-perf-test \
              --topic benchmark-test \
              --num-records 1000000 \
              --record-size 100 \
              --throughput -1 \
              --producer-props bootstrap.servers=localhost:9092 batch.size=10000 linger.ms=50 \
              2>&1 | tail -1)
            echo "$RESULT"
            
            MBPS=$(echo "$RESULT" | grep -oE '[0-9]+\.[0-9]+ MB/sec' | grep -oE '[0-9]+\.[0-9]+' || echo "0")
            RPS=$(echo "$RESULT" | grep -oE '[0-9]+\.[0-9]+ records/sec' | grep -oE '[0-9]+\.[0-9]+' || echo "0")
            AVG_LAT=$(echo "$RESULT" | grep -oE '[0-9]+\.[0-9]+ ms avg' | grep -oE '[0-9]+\.[0-9]+' || echo "0")
            P99_LAT=$(echo "$RESULT" | grep -oE '[0-9]+ ms 99th' | grep -oE '[0-9]+' | head -1 || echo "0")
            
            TOTAL_MBPS=$(echo "$TOTAL_MBPS + $MBPS" | bc)
            TOTAL_RPS=$(echo "$TOTAL_RPS + $RPS" | bc)
            LATENCIES_AVG+=($AVG_LAT)
            LATENCIES_P99+=($P99_LAT)
            
            sleep 2
          done
          
          AVG_MBPS=$(echo "scale=2; $TOTAL_MBPS / 3" | bc)
          AVG_RPS=$(echo "scale=2; $TOTAL_RPS / 3" | bc)
          
          echo "kafka_producer_mbps=$AVG_MBPS" >> $GITHUB_OUTPUT
          echo "kafka_producer_rps=$AVG_RPS" >> $GITHUB_OUTPUT
          echo "kafka_latency_avg=${LATENCIES_AVG[1]}" >> $GITHUB_OUTPUT
          echo "kafka_latency_p99=${LATENCIES_P99[1]}" >> $GITHUB_OUTPUT
          
      - name: "🔵 Kafka Consumer Benchmark (3 runs)"
        id: kafka_consumer
        run: |
          echo "Running Kafka consumer benchmark (3 runs)..."
          KAFKA_CONTAINER=$(docker ps -q -f ancestor=confluentinc/cp-kafka:7.5.0)
          
          TOTAL_MBPS=0
          
          for run in 1 2 3; do
            echo "--- Run $run/3 ---"
            
            RESULT=$(docker exec $KAFKA_CONTAINER \
              kafka-consumer-perf-test \
              --topic benchmark-test \
              --bootstrap-server localhost:9092 \
              --messages 1000000 \
              --timeout 60000 \
              2>&1 | tail -1)
            echo "$RESULT"
            
            # Extract MB/sec from consumer output (different format)
            MBPS=$(echo "$RESULT" | awk -F',' '{print $4}' | tr -d ' ' || echo "0")
            if [ -z "$MBPS" ] || [ "$MBPS" = "0" ]; then
              MBPS=$(echo "$RESULT" | grep -oE '[0-9]+\.[0-9]+' | head -3 | tail -1 || echo "0")
            fi
            
            TOTAL_MBPS=$(echo "$TOTAL_MBPS + $MBPS" | bc 2>/dev/null || echo "0")
            sleep 2
          done
          
          AVG_MBPS=$(echo "scale=2; $TOTAL_MBPS / 3" | bc 2>/dev/null || echo "0")
          echo "kafka_consumer_mbps=$AVG_MBPS" >> $GITHUB_OUTPUT

      # ═══════════════════════════════════════════════════════════════════════
      # PRKDB COMPREHENSIVE BENCHMARK
      # ═══════════════════════════════════════════════════════════════════════
      - name: "🟢 PrkDB Comprehensive Benchmark (Producer + Consumer + Latency)"
        id: prkdb_comprehensive
        run: |
          echo "Running PrkDB comprehensive benchmark..."
          OUTPUT=$(./target/release/examples/comprehensive_bench 2>&1)
          echo "$OUTPUT"
          
          # Extract metrics from output
          PRODUCER_AVG=$(echo "$OUTPUT" | grep "producer_avg_mbps=" | cut -d= -f2)
          CONSUMER_AVG=$(echo "$OUTPUT" | grep "consumer_avg_mbps=" | cut -d= -f2)
          LATENCY_AVG=$(echo "$OUTPUT" | grep "latency_avg_us=" | cut -d= -f2)
          LATENCY_P50=$(echo "$OUTPUT" | grep "latency_p50_us=" | cut -d= -f2)
          LATENCY_P95=$(echo "$OUTPUT" | grep "latency_p95_us=" | cut -d= -f2)
          LATENCY_P99=$(echo "$OUTPUT" | grep "latency_p99_us=" | cut -d= -f2)
          
          echo "prkdb_producer_mbps=$PRODUCER_AVG" >> $GITHUB_OUTPUT
          echo "prkdb_consumer_mbps=$CONSUMER_AVG" >> $GITHUB_OUTPUT
          echo "prkdb_latency_avg_us=$LATENCY_AVG" >> $GITHUB_OUTPUT
          echo "prkdb_latency_p50_us=$LATENCY_P50" >> $GITHUB_OUTPUT
          echo "prkdb_latency_p95_us=$LATENCY_P95" >> $GITHUB_OUTPUT
          echo "prkdb_latency_p99_us=$LATENCY_P99" >> $GITHUB_OUTPUT
          
      # ═══════════════════════════════════════════════════════════════════════
      # SUSTAINED LOAD TEST (10M Records, ~1GB)
      # ═══════════════════════════════════════════════════════════════════════
      - name: "🔵 Kafka Sustained Load (10M records)"
        id: kafka_sustained
        run: |
          echo "Running Kafka sustained load test (10M records)..."
          KAFKA_CONTAINER=$(docker ps -q -f ancestor=confluentinc/cp-kafka:7.5.0)
          
          RESULT=$(docker exec $KAFKA_CONTAINER \
            kafka-producer-perf-test \
            --topic benchmark-test \
            --num-records 10000000 \
            --record-size 100 \
            --throughput -1 \
            --producer-props bootstrap.servers=localhost:9092 batch.size=10000 linger.ms=50 \
            2>&1 | tail -1)
          echo "$RESULT"
          
          MBPS=$(echo "$RESULT" | grep -oE '[0-9]+\.[0-9]+ MB/sec' | grep -oE '[0-9]+\.[0-9]+' || echo "0")
          echo "kafka_sustained_mbps=$MBPS" >> $GITHUB_OUTPUT

      - name: "🟢 PrkDB Sustained Load (10M records)"
        id: prkdb_sustained
        run: |
          echo "Running PrkDB sustained load test (10M records)..."
          OUTPUT=$(./target/release/examples/comprehensive_bench 10000000 2>&1)
          echo "$OUTPUT"
          
          MBPS=$(echo "$OUTPUT" | grep "producer_avg_mbps=" | cut -d= -f2)
          echo "prkdb_sustained_mbps=$MBPS" >> $GITHUB_OUTPUT

      - name: "🟢 PrkDB Partitioned Benchmark"
        id: prkdb_partitioned
        run: |
          echo "Running PrkDB partitioned benchmark..."
          OUTPUT=$(./target/release/examples/partitioned_bench 2>&1)
          echo "$OUTPUT"
          
          PEAK_MBPS=$(echo "$OUTPUT" | grep "Peak throughput" | grep -oE '[0-9]+\.[0-9]+' || echo "0")
          echo "prkdb_peak_mbps=$PEAK_MBPS" >> $GITHUB_OUTPUT

      # ═══════════════════════════════════════════════════════════════════════
      # GENERATE COMPREHENSIVE REPORT
      # ═══════════════════════════════════════════════════════════════════════
      - name: "📊 Generate Benchmark Report"
        run: |
          mkdir -p benchmark_results
          
          KAFKA_PROD="${{ steps.kafka_producer.outputs.kafka_producer_mbps }}"
          KAFKA_CONS="${{ steps.kafka_consumer.outputs.kafka_consumer_mbps }}"
          KAFKA_LAT="${{ steps.kafka_producer.outputs.kafka_latency_avg }}"
          KAFKA_P99="${{ steps.kafka_producer.outputs.kafka_latency_p99 }}"
          
          PRKDB_PROD="${{ steps.prkdb_comprehensive.outputs.prkdb_producer_mbps }}"
          PRKDB_CONS="${{ steps.prkdb_comprehensive.outputs.prkdb_consumer_mbps }}"
          PRKDB_LAT="${{ steps.prkdb_comprehensive.outputs.prkdb_latency_avg_us }}"
          PRKDB_P50="${{ steps.prkdb_comprehensive.outputs.prkdb_latency_p50_us }}"
          PRKDB_P95="${{ steps.prkdb_comprehensive.outputs.prkdb_latency_p95_us }}"
          PRKDB_P99="${{ steps.prkdb_comprehensive.outputs.prkdb_latency_p99_us }}"
          PRKDB_PEAK="${{ steps.prkdb_partitioned.outputs.prkdb_peak_mbps }}"
          
          KAFKA_SUST="${{ steps.kafka_sustained.outputs.kafka_sustained_mbps }}"
          PRKDB_SUST="${{ steps.prkdb_sustained.outputs.prkdb_sustained_mbps }}"
          
          # Generate JSON
          cat > benchmark_results/results.json << EOF
          {
            "timestamp": "$(date -Iseconds)",
            "runner": "${{ runner.os }}-${{ runner.arch }}",
            "runs": 3,
            "notes": "Kafka results are single-broker perf-tool reference runs. PrkDB results are local native storage-engine benchmarks. These numbers are not apples-to-apples product comparisons.",
            "kafka": {
              "producer_mbps": $KAFKA_PROD,
              "consumer_mbps": ${KAFKA_CONS:-0},
              "sustained_mbps": ${KAFKA_SUST:-0},
              "latency_avg_ms": $KAFKA_LAT,
              "latency_p99_ms": $KAFKA_P99
            },
            "prkdb": {
              "producer_mbps": $PRKDB_PROD,
              "consumer_mbps": $PRKDB_CONS,
              "sustained_mbps": ${PRKDB_SUST:-0},
              "latency_avg_us": $PRKDB_LAT,
              "latency_p50_us": $PRKDB_P50,
              "latency_p95_us": $PRKDB_P95,
              "latency_p99_us": $PRKDB_P99,
              "partitioned_peak_mbps": ${PRKDB_PEAK:-0}
            }
          }
          EOF
          
          # Generate Markdown summary
          cat > benchmark_results/BENCHMARK_RESULTS.md << 'EOF'
          # 🔬 Benchmark Results
          
          **Important:** these results combine two different reference lanes:
          - Kafka single-broker runs using the official perf tools
          - local PrkDB native storage-engine benchmarks

          They are useful for regression tracking in this repo, but they are **not** an apples-to-apples product comparison.

          **Test Configuration:**
          - Records: 1,000,000 (Standard) / 10,000,000 (Sustained)
          - Record Size: 100 bytes
          - Batch Size: 10,000
          - Runs: 3 (averaged)
          
          ## Kafka Reference
          
          | Metric | Value |
          |--------|-------|
          EOF
          
          echo "| **Producer (1M)** | ${KAFKA_PROD} MB/s |" >> benchmark_results/BENCHMARK_RESULTS.md
          echo "| **Sustained (10M)** | ${KAFKA_SUST:-N/A} MB/s |" >> benchmark_results/BENCHMARK_RESULTS.md
          echo "| **Consumer** | ${KAFKA_CONS:-N/A} MB/s |" >> benchmark_results/BENCHMARK_RESULTS.md
          echo "| **Average latency** | ${KAFKA_LAT} ms |" >> benchmark_results/BENCHMARK_RESULTS.md
          echo "| **p99 latency** | ${KAFKA_P99} ms |" >> benchmark_results/BENCHMARK_RESULTS.md
          
          cat >> benchmark_results/BENCHMARK_RESULTS.md << EOF
          
          ## PrkDB Local Benchmarks
          
          | Metric | Value |
          |--------|-------|
          | **Producer (1M)** | ${PRKDB_PROD} MB/s |
          | **Sustained (10M)** | ${PRKDB_SUST:-N/A} MB/s |
          | **Consumer** | ${PRKDB_CONS} MB/s |
          | **Partitioned peak** | ${PRKDB_PEAK:-N/A} MB/s |
          | **Average batch latency** | ${PRKDB_LAT} μs |
          | **p50 batch latency** | ${PRKDB_P50} μs |
          | **p95 batch latency** | ${PRKDB_P95} μs |
          | **p99 batch latency** | ${PRKDB_P99} μs |
          
          ## 🔬 Methodology
          
          - **Kafka**: Official \`kafka-producer-perf-test\` and \`kafka-consumer-perf-test\`
          - **PrkDB**: Native Rust local benchmarks with mmap WAL
          - **Environment**: GitHub Actions ubuntu-latest
          - **Runs**: 3 runs per test, results averaged
          - **Interpretation**: use for trend tracking, not apples-to-apples claims
          
          ---
          *Generated: $(date -Iseconds)*
          EOF
          
          cat benchmark_results/BENCHMARK_RESULTS.md
          
      - name: "📤 Upload Results"
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_number }}
          path: benchmark_results/
          retention-days: 90
          
      - name: "📝 Post to Step Summary"
        run: |
          cat benchmark_results/BENCHMARK_RESULTS.md >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # CROSS-LANGUAGE BENCHMARKS
  # ═══════════════════════════════════════════════════════════════════════════
  cross-lang-benchmark:
    name: "🌍 Cross-Language Benchmarks"
    runs-on: ubuntu-latest
    env:
      PRKDB_ADMIN_TOKEN: benchmark_ci_admin_token
    steps:
      - uses: actions/checkout@v4
      - name: Install Protoc
        run: sudo apt-get install -y protobuf-compiler
      
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build PrkDB CLI
        run: cargo build --release -p prkdb-cli
        
      - name: Install Python dependencies
        run: pip install httpx

      - name: Start PrkDB Server
        run: |
          ./target/release/prkdb-cli --database /tmp/prkdb-cross-lang-benchmark.db serve --port 8080 --grpc-port 50051 &
          echo "Waiting for server..."
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8080/health >/dev/null 2>&1 \
              && ./target/release/prkdb-cli schema --server http://127.0.0.1:50051 list >/dev/null 2>&1; then
              echo "PrkDB is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "PrkDB failed to become ready"
              exit 1
            fi
            sleep 1
          done
          
      - name: Define Benchmark Schema
        run: |
          # Create a simple schema for benchmarking
          cat > bench.proto <<EOF
          syntax = "proto3";
          package models;
          message Benchmark {
            string id = 1;
            string payload = 2;
            int64 timestamp = 3;
          }
          EOF
          protoc --descriptor_set_out=bench.desc --include_imports bench.proto
          
          # Register it
          ./target/release/prkdb-cli schema --server http://127.0.0.1:50051 register --collection benchmark --proto bench.desc
          
      - name: Generate Clients
        run: |
          # Python
          ./target/release/prkdb-cli codegen --server http://127.0.0.1:50051 --lang python --out benches/client_py --collection benchmark
          # TypeScript
          ./target/release/prkdb-cli codegen --server http://127.0.0.1:50051 --lang typescript --out benches/client_ts --collection benchmark
          
      - name: "🐍 Run Python Benchmark"
        run: |
          python3 benches/bench_python.py --server http://127.0.0.1:8080 --records 10000
          
      - name: "📘 Run TypeScript Benchmark"
        run: |
          # Compile TS if needed or run with tsx (simpler ESM support)
          npm install -g tsx typescript
          # Fix import path in generated file if necessary? 
          # The benchmark script imports from ./client_ts/benchmark.ts
          
          tsx benches/bench_ts.ts
        env:
          PRKDB_SERVER: http://127.0.0.1:8080
          NUM_RECORDS: 10000
